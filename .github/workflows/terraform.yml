name: 'Terraform CI/CD'

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/live/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create backend.hcl
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_STATE_BUCKET }}"
          key          = "envs/dev/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          encrypt      = true
          use_lockfile = true
          EOF

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          aws_region    = "${{ vars.AWS_REGION }}"
          instance_type = "t3.small"
          key_name      = "${{ vars.AWS_KEY_NAME }}"
          my_ip         = "${{ vars.MY_IP }}"
          EOF

      - name: Terraform Init
        run: terraform init -reconfigure -backend-config="backend.hcl"

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=300s

      - name: Terraform Apply (only main)
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -lock-timeout=300s
