---
- name: Setup App Node
  hosts: app
  become: true

  vars:
    app_dir: /home/ubuntu/proshop_mern
    repo_url: '{{ app_repo_url }}'
    repo_branch: '{{ app_repo_branch }}'
    certbot_webroot: /var/www/certbot

  tasks:
    - name: Validate required SSL variables
      assert:
        that:
          - domain_name is defined
          - domain_name | length > 0
          - certbot_email is defined
          - certbot_email | length > 0
        fail_msg: "domain_name and certbot_email must be defined in group_vars before running the app playbook."

    - name: Install app node packages
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
          - unzip
        state: present
        update_cache: yes

    - name: Install Fail2ban on App Node
      apt:
        name: fail2ban
        state: present

    - name: Configure Fail2ban for App Node
      template:
        src: ../templates/fail2ban-app.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      notify: Restart fail2ban

    - name: Enable and start Fail2ban
      systemd:
        name: fail2ban
        enabled: yes
        state: started

    - name: Clone ProShop repository
      git:
        repo: '{{ repo_url }}'
        dest: '{{ app_dir }}'
        version: '{{ repo_branch }}'
        force: yes

    - name: Copy backend Dockerfile
      copy:
        src: ../files/Dockerfile.backend
        dest: '{{ app_dir }}/Dockerfile.backend'

    - name: Copy frontend Dockerfile
      copy:
        src: ../files/Dockerfile.frontend
        dest: '{{ app_dir }}/Dockerfile.frontend'

    - name: Copy app compose file
      copy:
        src: ../files/compose.app.yml
        dest: '{{ app_dir }}/compose.yml'

    - name: Create backend env file
      template:
        src: ../templates/app.env.j2
        dest: '{{ app_dir }}/.env'
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      no_log: true

    - name: Update frontend proxy
      replace:
        path: '{{ app_dir }}/frontend/package.json'
        regexp: 'http://127.0.0.1:5000'
        replace: 'http://backend:5000'

    - name: Run ProShop with Docker Compose
      command: docker compose up -d --build
      args:
        chdir: '{{ app_dir }}'

    - name: Check products count
      command: >
        docker exec mongo mongo proshop --quiet --eval "db.products.count()"
      register: product_count
      changed_when: false

    - name: Seed database if empty
      command: docker exec backend npm run data:import
      when: product_count.stdout | trim == "0"

    - name: Install Node Exporter compose directory
      file:
        path: /home/ubuntu/node-exporter
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Create Node Exporter compose file
      copy:
        dest: /home/ubuntu/node-exporter/compose.yml
        content: |
          services:
            node-exporter:
              image: prom/node-exporter
              container_name: node-exporter
              restart: always
              ports:
                - "9100:9100"

    - name: Run Node Exporter
      command: docker compose up -d
      args:
        chdir: /home/ubuntu/node-exporter

    - name: Check if Let's Encrypt certificate already exists
      stat:
        path: '/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem'
      register: certbot_certificate

    - name: Create Certbot webroot directory
      file:
        path: '{{ certbot_webroot }}'
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Configure Nginx reverse proxy
      template:
        src: ../templates/nginx-proshop.conf.j2
        dest: /etc/nginx/sites-available/proshop
      vars:
        nginx_ssl_enabled: '{{ certbot_certificate.stat.exists }}'
      notify: Reload nginx

    - name: Enable ProShop Nginx site
      file:
        src: /etc/nginx/sites-available/proshop
        dest: /etc/nginx/sites-enabled/proshop
        state: link
        force: yes
      notify: Reload nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure Nginx is enabled
      systemd:
        name: nginx
        enabled: yes
        state: started

    - name: Apply HTTP-only Nginx configuration before certificate issuance
      meta: flush_handlers

    - name: Request Let's Encrypt certificate with webroot
      command:
        argv:
          - certbot
          - certonly
          - --webroot
          - -w
          - '{{ certbot_webroot }}'
          - -d
          - '{{ domain_name }}'
          - --non-interactive
          - --agree-tos
          - -m
          - '{{ certbot_email }}'
      when: not certbot_certificate.stat.exists

    - name: Check certificate after Certbot execution
      stat:
        path: '/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem'
      register: certbot_certificate_after

    - name: Configure Nginx with HTTPS
      template:
        src: ../templates/nginx-proshop.conf.j2
        dest: /etc/nginx/sites-available/proshop
      vars:
        nginx_ssl_enabled: '{{ certbot_certificate_after.stat.exists }}'
      notify: Reload nginx

    - name: Apply final Nginx configuration
      meta: flush_handlers

    - name: Enable and start Certbot renewal timer
      systemd:
        name: certbot.timer
        enabled: yes
        state: started

    - name: Create Promtail directory
      file:
        path: /home/ubuntu/promtail
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Download Promtail
      get_url:
        url: https://github.com/grafana/loki/releases/download/v2.9.0/promtail-linux-amd64.zip
        dest: /home/ubuntu/promtail/promtail-linux-amd64.zip

    - name: Unzip Promtail
      unarchive:
        src: /home/ubuntu/promtail/promtail-linux-amd64.zip
        dest: /home/ubuntu/promtail
        remote_src: yes

    - name: Make Promtail executable
      file:
        path: /home/ubuntu/promtail/promtail-linux-amd64
        mode: '0755'

    - name: Create Promtail config
      template:
        src: ../templates/promtail-config.yml.j2
        dest: /home/ubuntu/promtail/config-promtail.yml

    - name: Create Promtail systemd service
      copy:
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail Log Agent
          After=network.target

          [Service]
          ExecStart=/home/ubuntu/promtail/promtail-linux-amd64 -config.file=/home/ubuntu/promtail/config-promtail.yml
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start Promtail
      systemd:
        name: promtail
        enabled: yes
        state: restarted

  handlers:
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted

    - name: Validate nginx config
      listen: Reload nginx
      command: nginx -t
      changed_when: false

    - name: Reload nginx
      listen: Reload nginx
      systemd:
        name: nginx
        state: reloaded
